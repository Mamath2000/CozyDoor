version: '3.8'

services:
  cozydoor:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: cozydoor-dev
    network_mode: host
    restart: "no"
    volumes:
      - ./config.json:/app/config.json:ro
      - ./app:/app/app:ro  # Hot reload pour développement
    environment:
      - NODE_ENV=development
    command: node app/monitorAll.js
