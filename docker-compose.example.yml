# Docker Compose exemple complet
# Utilise un serveur MQTT existant sur le réseau local
# Usage: docker compose -f docker-compose.example.yml up

services:
  # CozyDoor Monitor
  cozydoor:
    build: .
    container_name: cozydoor
    # MODE HOST OBLIGATOIRE pour scanner le réseau local
    network_mode: host
    restart: unless-stopped
    volumes:
      # Monter votre fichier de configuration
      - ./config.json:/app/config.json:ro
    environment:
      - NODE_ENV=production
      # Variables d'environnement pour la configuration MQTT (optionnel)
      - MQTT_HOST=192.168.100.190
      - MQTT_PORT=1883
    # Health check avancé : vérifie la connexion MQTT et le processus Node
    healthcheck:
      test: |
        sh -c '
        # Vérifier que le processus Node tourne
        ps aux | grep -v grep | grep "node.*monitorAll.js" > /dev/null || exit 1
        
        # Vérifier la connexion au broker MQTT (avec nc)
        nc -zv ${MQTT_HOST:-192.168.100.190} ${MQTT_PORT:-1883} 2>&1 > /dev/null || exit 1
        
        exit 0
        '
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
