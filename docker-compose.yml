services:
  cozydoor:
    build: .
    container_name: cozydoor
    # MODE HOST OBLIGATOIRE pour scanner le réseau local
    network_mode: host
    restart: unless-stopped
    volumes:
      # Monter votre fichier de configuration
      - ./config.json:/app/config.json:ro
    environment:
      - NODE_ENV=production
    # Health check : utilise le script healthcheck.sh qui lit config.json
    healthcheck:
      test: ["CMD", "/app/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
