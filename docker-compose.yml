services:
  cozydoor:
    build: .
    container_name: cozydoor
    # MODE HOST OBLIGATOIRE pour scanner le réseau local
    network_mode: host
    restart: unless-stopped
    volumes:
      # Monter votre fichier de configuration
      - ./config.json:/app/config.json:ro
    environment:
      - NODE_ENV=production
    # Logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
